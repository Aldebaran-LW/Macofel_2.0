# Blueprint Render: apenas API Python de importação de catálogo.
# O site Next.js (Macofel) deve estar na Vercel — não fazer build Next neste blueprint.
# Ver render-catalog-import/README.md
services:
  - type: web
    name: macofel-catalog-import
    env: python
    region: oregon
    plan: free
    rootDir: render-catalog-import
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: RENDER_CATALOG_IMPORT_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: CORS_ORIGINS
        sync: false
