name: Ping telegram-bot (keep awake)

on:
  schedule:
    # Intenção: tentar rodar a cada 10 minutos (UTC). O GitHub Actions NÃO garante precisão para `schedule`
    # (pode atrasar/consolidar execuções dependendo de carga/políticas do GitHub).
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping health endpoint
        run: |
          set -euo pipefail
          url="https://macofel-telegram-bot.onrender.com/health"
          echo "Pinging: $url"
          # --fail: falha se HTTP >= 400
          # --retry: tenta de novo em falhas transitórias
          curl --fail --silent --show-error \
            --max-time 20 \
            --retry 3 \
            --retry-all-errors \
            --retry-delay 2 \
            "$url" | head -c 200

