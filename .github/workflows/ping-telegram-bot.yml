name: Ping telegram-bot (keep awake)

on:
  schedule:
    # Intenção: tentar rodar a cada 10 minutos (UTC). O GitHub Actions NÃO garante precisão para `schedule`
    # (pode atrasar/consolidar execuções dependendo de carga/políticas do GitHub).
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

# Não precisa de token nem de secrets; explícito evita surpresas com default de permissões.
permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping health endpoint
        run: |
          set -euo pipefail
          url="https://macofel-telegram-bot.onrender.com/health"
          echo "Pinging: $url"
          # Não use `curl | head`: o `head` fecha o pipe cedo e o `curl` pode receber SIGPIPE
          # (exit 141) e falhar o job com `set -o pipefail` mesmo com HTTP 200.
          # --fail: falha se HTTP >= 400; -o /dev/null: não precisamos do corpo
          curl --fail --silent --show-error \
            --max-time 20 \
            --retry 3 \
            --retry-all-errors \
            --retry-delay 2 \
            -o /dev/null \
            "$url"
          echo "ok"

