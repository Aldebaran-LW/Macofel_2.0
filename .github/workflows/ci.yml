# Validação em cada push/PR na main.
# Nota: `npm run lint` pede configuração interativa do ESLint neste repo (sem eslint.config no raiz),
# por isso aqui só validamos TypeScript (`tsc --noEmit`), que já cobre muitos erros de integração.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit
